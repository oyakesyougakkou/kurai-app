<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>位取り表</title>

<style>
  body { text-align: center; }
  table { border-collapse: collapse; margin: 0 auto; }

  th, td {
    border: 1px solid #333;
    width: 45px;
    height: 35px;
    text-align: center;
    user-select: none;
    font-size: 13px;
  }

  th:nth-child(4n), td:nth-child(4n) {
    border-right: 3px solid #000;
  }

  .cho { background:#a9d18e; }
  .oku { background:#ffd966; }
  .man { background:#c9c9f5; }
  .one { background:#f4b6c2; }

  .cell { background:white; }
  .active { background:orange; }

  .count {
    background:#f0f0f0;
    font-weight:bold;
    font-size:22px;
  }

  button, input {
    font-size:16px;
    margin:5px;
  }

  #kanji { font-size:20px; margin-top:10px; }
</style>
</head>

<body>

<h2>位取り表</h2>

<input id="numInput" placeholder="数字を入力">
<button onclick="applyNumber()">数字をマスに</button>
<button onclick="clearAll()">クリア</button>
<button onclick="showKanji()">漢字</button>

<p id="kanji"></p>

<table id="table">
  <tr>
    <th>千</th><th>百</th><th>十</th><th>一</th>
    <th>千</th><th>百</th><th>十</th><th>一</th>
    <th>千</th><th>百</th><th>十</th><th>一</th>
    <th>千</th><th>百</th><th>十</th><th>一</th>
  </tr>
  <tr>
    <th colspan="4" class="cho">兆（ちょう）</th>
    <th colspan="4" class="oku">億（おく）</th>
    <th colspan="4" class="man">万（まん）</th>
    <th colspan="4" class="one"></th>
  </tr>
</table>

<script>
const table = document.getElementById("table");
const COLS = 16;
const ROWS = 10;
const FIRST = 2;
const LAST = FIRST + ROWS - 1;

/* タッチできる10マス */
for (let r = 0; r < ROWS; r++) {
  const tr = document.createElement("tr");
  for (let c = 0; c < COLS; c++) {
    const td = document.createElement("td");
    td.className = "cell";
    td.onclick = () => toggle(c);
    tr.appendChild(td);
  }
  table.appendChild(tr);
}

/* 数字表示 */
const countRow = document.createElement("tr");
for (let c = 0; c < COLS; c++) {
  const td = document.createElement("td");
  td.className = "count";
  td.id = "count-" + c;
  td.textContent = "0";
  countRow.appendChild(td);
}
table.appendChild(countRow);

/* タッチ処理 */
function toggle(col) {
  for (let r = LAST; r >= FIRST; r--) {
    const cell = table.rows[r].cells[col];
    if (!cell.classList.contains("active")) {
      cell.classList.add("active");
      update(col);
      return;
    }
  }
}

/* 数える & 10でくり上がり */
function update(col) {
  let cnt = 0;
  for (let r = FIRST; r <= LAST; r++) {
    if (table.rows[r].cells[col].classList.contains("active")) cnt++;
  }

  if (cnt >= 10 && col > 0) {
    for (let r = FIRST; r <= LAST; r++) {
      table.rows[r].cells[col].classList.remove("active");
    }
    document.getElementById("count-" + col).textContent = "0";
    toggle(col - 1);   // くり上がり
  } else {
    document.getElementById("count-" + col).textContent = cnt;
  }
}

/* 全消去 */
function clearAll() {
  document.getElementById("kanji").textContent = "";
  for (let r = FIRST; r <= LAST; r++) {
    for (let c = 0; c < COLS; c++) {
      table.rows[r].cells[c].classList.remove("active");
    }
  }
  for (let c = 0; c < COLS; c++) {
    document.getElementById("count-" + c).textContent = "0";
  }
}

/* 数字 → マス */
function applyNumber() {
  const numStr = document.getElementById("numInput").value;
  if (!/^\d+$/.test(numStr)) return;

  clearAll();

  const num = numStr.padStart(16, "0");
  for (let i = 15; i >= 0; i--) {
    let d = parseInt(num[i]);
    for (let k = 0; k < d; k++) toggle(i);
  }
}

/* 漢字表示（小4準拠） */
function showKanji() {
  const kanjiNum = ["零","一","二","三","四","五","六","七","八","九"];
  const pos = ["千","百","十",""];
  const units = ["兆","億","万",""];

  const nums = [];
  for (let c = 0; c < COLS; c++) {
    nums.push(parseInt(document.getElementById("count-" + c).textContent));
  }

  const groups = [
    nums.slice(0,4),
    nums.slice(4,8),
    nums.slice(8,12),
    nums.slice(12,16)
  ];

  let result = "";
  for (let i = 0; i < 4; i++) {
    const g = groups[i];
    let part = "";
    for (let j = 0; j < 4; j++) {
      const n = g[j];
      if (n === 0) continue;
      if (n === 1 && j !== 3) part += pos[j];
      else part += kanjiNum[n] + pos[j];
    }
    if (part === "" && g[3] === 1 && g.slice(0,3).every(x => x === 0)) part = "一";
    if (part) result += part + units[i];
  }

  document.getElementById("kanji").textContent =
    result === "" ? "零" : result;
}
</script>

</body>
</html>
